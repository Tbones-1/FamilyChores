<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Chores</title>
    <style>
        :root {
            /* Exact Colors */
            --jess: #E74C3C;     
            --magnolia: #FF69B4; 
            --dahlia: #9B59B6;   
            --duke: #3498DB;     
            --tyson: #2ECC71;    
            --sutton: #FFFFFF;   
            
            --bg: #000000;
            --text: #FFFFFF;
            --panel: #111111;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 0; background-color: var(--bg); color: var(--text);
            user-select: none;
        }
        
        /* Navigation / Header */
        header {
            background: #1a1a1a; padding: 15px 20px; display: flex;
            justify-content: space-between; align-items: center; border-bottom: 2px solid #333;
        }
        header h1 { margin: 0; font-size: 24px; color: #fff; }
        .hidden-lock { cursor: pointer; opacity: 0.2; font-size: 24px; padding: 0 10px; }
        .nav-buttons button {
            padding: 10px 20px; font-size: 18px; margin-left: 10px;
            cursor: pointer; border: none; border-radius: 8px;
            background: #333; color: #888; transition: 0.2s;
        }
        .nav-buttons button.active { background: #fff; color: #000; font-weight: bold; }

        #app-content { padding: 20px; max-width: 1100px; margin: 0 auto; }

        /* Kid Selector View */
        .kid-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 40px; margin-top: 40px; justify-items: center;
        }
        .kid-profile { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .kid-circle {
            width: 180px; height: 180px; border-radius: 50%; position: relative;
            display: flex; justify-content: center; align-items: center; font-size: 90px; cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 8px solid #333;
            transition: transform 0.1s, border-color 0.3s; background: var(--panel);
        }
        .kid-circle:active { transform: scale(0.9); }
        .kid-name { font-size: 32px; font-weight: bold; letter-spacing: 2px; }

        /* Path & Dashboard */
        .kid-header { margin-bottom: 30px; }
        .back-btn { font-size: 40px; cursor: pointer; display: inline-block; margin-bottom: 10px;}
        .path-container {
            display: flex; align-items: center; justify-content: space-between;
            background: var(--panel); padding: 15px 30px; border-radius: 100px; border: 2px solid #333;
        }
        .path-avatar, .path-reward { font-size: 60px; display: flex; flex-direction: column; align-items: center; justify-content: center;}
        .path-reward-text { font-size: 16px; color: #aaa; margin-top: 5px; font-weight: bold; text-align: center; max-width: 120px; line-height: 1.2;}
        .stones-track { display: flex; flex-grow: 1; justify-content: space-evenly; margin: 0 20px; }
        
        /* Dynamic Image/Emoji Styling */
        .reward-img-large { width: 80px; height: 80px; object-fit: contain; filter: drop-shadow(0 0 10px rgba(255,255,255,0.2)); border-radius: 8px;}
        .reward-img-small { width: 40px; height: 40px; object-fit: cover; border-radius: 6px; vertical-align: middle; margin-right: 10px; border: 1px solid #444;}
        .reward-img-massive { width: 250px; height: 250px; object-fit: contain; filter: drop-shadow(0 0 30px rgba(255,255,255,0.5)); border-radius: 20px; margin: 20px 0;}

        /* Goal Reached Animation */
        .ready-to-claim {
            animation: pulse-reward 1s infinite alternate;
            cursor: pointer; border: 4px solid #FFD166; border-radius: 20px; padding: 10px 20px;
            background: rgba(255, 209, 102, 0.15); box-shadow: 0 0 20px rgba(255, 209, 102, 0.4);
        }
        @keyframes pulse-reward {
            0% { transform: scale(1); box-shadow: 0 0 15px rgba(255, 209, 102, 0.4); }
            100% { transform: scale(1.08); box-shadow: 0 0 30px rgba(255, 209, 102, 0.8), 0 0 10px #fff inset; }
        }

        /* Stepping Stones & Pending Animation */
        .stone {
            width: 30px; height: 30px; background: #222; border-radius: 50%; border: 3px solid #444; 
            transition: all 0.5s;
        }
        .stone.filled { border-color: #fff; box-shadow: 0 0 15px currentColor; transform: scale(1.1); }
        .stone.pending {
            border-color: #FFD700;
            background: repeating-linear-gradient(45deg, #FFD700, #FFD700 5px, #b8860b 5px, #b8860b 10px);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
            animation: pulse 1.5s infinite, popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1.1); opacity: 1; } }

        /* Chores Grid */
        .chore-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 25px; margin-top: 20px; }
        .chore-btn {
            border-radius: 25px; padding: 25px 10px;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px;
            cursor: pointer; transition: all 0.1s; position: relative;
        }
        .chore-btn:active { transform: scale(0.95); }
        
        .chore-btn.assigned {
            background: #2a2505; 
            border: 4px solid #FFD166;
            box-shadow: 0 5px 15px rgba(255, 209, 102, 0.15);
        }
        .chore-btn.extra {
            background: var(--panel);
            border: 3px dashed #444;
            opacity: 0.9;
        }
        
        .chore-points {
            position: absolute; top: -12px; right: -12px;
            background: var(--bg); color: #FFD166; 
            border: 3px solid #FFD166; border-radius: 50%;
            width: 35px; height: 35px; 
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        .chore-emoji { font-size: 70px; }
        .chore-label { font-size: 20px; font-weight: bold; color: #ccc; text-align: center;}
        .empty-chores { text-align: center; font-size: 24px; color: #666; grid-column: 1 / -1; margin-top: 40px; }

        /* Toggle Extra Chores */
        .extra-chores-container { display: none; }
        .toggle-extras-btn {
            background: #222; color: #FFD166; border: 2px dashed #444; padding: 15px;
            border-radius: 15px; font-size: 18px; text-align: center; cursor: pointer;
            margin-top: 30px; font-weight: bold; transition: 0.2s;
        }
        .toggle-extras-btn:active { background: #333; transform: scale(0.98); }

        /* Mealtime */
        .meal-container { text-align: center; margin-top: 20px;}
        .spin-btn { 
            font-size: 35px; padding: 20px 50px; background: #FFD166; color: #000;
            border: none; border-radius: 100px; cursor: pointer; font-weight: bold; 
            box-shadow: 0 8px 0 #d4a742; margin-bottom: 40px; transition: 0.1s;
        }
        .spin-btn:active { transform: translateY(8px); box-shadow: none; }
        .active-toggles { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-bottom: 40px; }
        .toggle-kid { 
            display: flex; flex-direction: column; align-items: center; padding: 15px; 
            border-radius: 20px; background: #222; cursor: pointer; border: 4px solid #222; opacity: 0.4;
        }
        .toggle-kid .toggle-icon { font-size: 40px; margin-bottom: 5px; }
        .toggle-kid .toggle-name { font-size: 14px; font-weight: bold; color: #fff;}
        .toggle-kid.active { opacity: 1; border-color: #fff; background: var(--panel); }
        
        /* SLEEK NEW MEALTIME AESTHETICS */
        .meal-assignments { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 20px; 
            text-align: left; 
        }
        .meal-slot { 
            background: linear-gradient(145deg, #1a1a1a, #111111); 
            padding: 15px 20px; 
            border-radius: 16px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border: 1px solid #333;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }
        .slot-chore { 
            font-size: 60px; 
            display: inline-block; 
            text-align: center; 
            width: 110px;
        }
        .slot-chore-img { 
            width: 110px; 
            height: 110px; 
            object-fit: contain; 
            border-radius: 12px; 
            background: transparent; 
        }
        .slot-chore-name { 
            font-size: 18px; 
            font-weight: 500; 
            color: #e0e0e0; 
            flex-grow: 1; 
            padding-left: 20px;
            letter-spacing: 0.5px;
        }
        .slot-assignee { 
            font-size: 55px; 
            background: #000; 
            width: 85px; 
            height: 85px; 
            border-radius: 50%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            border: 3px solid #444; 
            flex-shrink: 0;
            box-shadow: inset 0 0 10px rgba(255,255,255,0.05);
        }

        /* Parent Dashboard */
        .parent-section { background: var(--panel); padding: 25px; border-radius: 15px; margin-bottom: 30px; border: 1px solid #333; }
        .parent-section h2 { margin-top: 0; color: #FFD166; border-bottom: 1px solid #333; padding-bottom: 10px;}
        .table-container { max-height: 400px; overflow-y: auto; margin-bottom: 15px; border: 1px solid #333; border-radius: 8px;}
        table { width: 100%; border-collapse: collapse; color: #ddd; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #333; font-size: 16px; vertical-align: middle;}
        th { color: #fff; background: #222; position: sticky; top: 0; z-index: 10;}
        .action-btn { background: #4CAF50; color: white; border: none; padding: 8px 12px; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: bold;}
        .edit-btn { background: #F39C12; margin-left: 5px;}
        .reject-btn, .delete-btn { background: #f44336; margin-left: 5px; }
        
        /* Inline Editing */
        .inline-input { background: #222; border: 1px solid #444; color: #fff; padding: 6px; border-radius: 4px; font-size: 14px; transition: 0.2s;}
        .inline-input:focus { outline: none; border-color: #FFD166; background: #000;}
        .inline-pts { width: 45px; text-align: center;}
        
        /* Add/Edit Forms */
        .add-form { background: #222; padding: 20px; border-radius: 10px; border: 1px solid #444;}
        .form-row { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 15px; align-items: center;}
        .form-row input[type="text"], .form-row input[type="number"] { 
            padding: 10px; border-radius: 5px; border: 1px solid #444; background: #000; color: #fff; font-size: 16px; 
        }
        .form-row label { display: flex; align-items: center; gap: 5px; font-size: 16px; cursor: pointer; background: #111; padding: 8px 12px; border-radius: 5px;}
        .form-row input[type="checkbox"] { transform: scale(1.5); margin-right: 5px;}
        .hint-text { color: #888; font-size: 13px; margin-top: -10px; margin-bottom: 15px; display: block; font-style: italic;}

        /* Animation */
        #celebration {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: none; justify-content: center; align-items: center;
            z-index: 9999; background: rgba(0,0,0,0.9); flex-direction: column; text-align: center;
        }
    </style>
</head>
<body>

    <header>
        <h1 id="header-title">Family Chores</h1>
        <div class="nav-buttons" id="nav-buttons">
            <button onclick="switchView('kids')" class="active" id="nav-kids">Chores</button>
            <button onclick="switchView('mealtime')" id="nav-meal">Mealtime</button>
        </div>
        <div class="hidden-lock" onclick="promptParent()">🔒</div>
    </header>

    <div id="app-content"></div>
    <div id="celebration"></div>

<script>
    // --- DATA STATE V13 ---
    const defaultData = {
        kids: [
            { id: 'jess', name: 'Jesse', icon: '🤠', color: 'var(--jess)', points: 0, rewardVisual: '🎮', rewardName: 'Kirby Game', rewardTarget: 50 },
            { id: 'magnolia', name: 'Magnolia', icon: '😻', color: 'var(--magnolia)', points: 0, rewardVisual: 'https://m.media-amazon.com/images/I/81PjFmZ38aL._AC_SL1500_.jpg', rewardName: 'Lego Set', rewardTarget: 40 },
            { id: 'dahlia', name: 'Dahlia', icon: '🦄', color: 'var(--dahlia)', points: 0, rewardVisual: '🚲', rewardName: 'Bike', rewardTarget: 100 },
            { id: 'duke', name: 'Duke', icon: '🦖', color: 'var(--duke)', points: 0, rewardVisual: '🍦', rewardName: 'Ice Cream', rewardTarget: 15 }
        ],
        extendedRoster: [
            { id: 'tyson', name: 'Tyson', icon: '👨', color: 'var(--tyson)' },
            { id: 'sutton', name: 'Sutton', icon: '👩', color: 'var(--sutton)' } 
        ],
        chores: [
            { id: 1, emoji: '🛏️', name: 'Make Bed', points: 1, recurrence: 1, assignees: ['jess', 'magnolia', 'dahlia', 'duke'], isExtra: false },
            { id: 2, emoji: '🪥', name: 'Brush Teeth', points: 1, recurrence: 1, assignees: ['jess', 'magnolia', 'dahlia', 'duke'], isExtra: false },
            { id: 3, emoji: '🧸', name: 'Pick up Toys', points: 1, recurrence: 1, assignees: ['jess', 'magnolia', 'dahlia', 'duke'], isExtra: false },
            { id: 4, emoji: '📚', name: 'Read 20 Mins', points: 2, recurrence: 1, assignees: ['jess', 'magnolia', 'dahlia', 'duke'], isExtra: false },
            { id: 6, emoji: '🍽️', name: 'Clear Table', points: 1, recurrence: 1, assignees: [], isExtra: true },
            { id: 8, emoji: '🍽️', name: 'Unload Dishwasher', points: 2, recurrence: 1, assignees: [], isExtra: true },
            { id: 12, emoji: '🗑️', name: 'Empty Trash', points: 2, recurrence: 2, assignees: [], isExtra: true },
            { id: 16, emoji: '🧹', name: 'Vacuum Living Room', points: 3, recurrence: 7, assignees: [], isExtra: true },
            { id: 21, emoji: '🧹', name: 'Clean Bedroom', points: 5, recurrence: 7, assignees: [], isExtra: true },
            { id: 26, emoji: '🌿', name: 'Pull Weeds', points: 5, recurrence: 7, assignees: [], isExtra: true },
            { id: 28, emoji: '🚗', name: 'Wash Car', points: 10, recurrence: 14, assignees: [], isExtra: true }
        ],
        mealChores: [
            { id: 101, emoji: 'set_table.png', name: 'Set Table' },
            { id: 102, emoji: 'dishes.png', name: 'Wash Dishes' },
            { id: 103, emoji: 'wash table.png', name: 'Wipe Table' },
            { id: 104, emoji: 'floor.png', name: 'Clean Floor' },
            { id: 105, emoji: 'prayer.png', name: 'Prayer' }
        ],
        pending: [],
        mealActiveKids: ['jess', 'magnolia', 'dahlia', 'duke', 'tyson', 'sutton']
    };

    let appData = JSON.parse(localStorage.getItem('choreDataV13')) || defaultData;
    let currentView = 'kids';
    let editingChoreId = null;
    let editingMealChoreId = null;

    function saveData() {
        localStorage.setItem('choreDataV13', JSON.stringify(appData));
    }

    // --- VISUAL RENDER HELPERS ---
    function getRewardHtml(visualStr, sizeClass) {
        if (!visualStr) return '🎁';
        if (visualStr.startsWith('http') || visualStr.startsWith('data:image')) {
            return `<img src="${visualStr}" class="${sizeClass}" alt="Reward">`;
        }
        let fontSize = '24px';
        if (sizeClass === 'reward-img-large') fontSize = '60px';
        if (sizeClass === 'reward-img-massive') fontSize = '150px';
        return `<span style="font-size: ${fontSize}; margin-right: 10px; vertical-align: middle;">${visualStr}</span>`;
    }

    function getMealVisualHtml(visualStr) {
        if (!visualStr) return '✨';
        if (visualStr.includes('.') || visualStr.startsWith('http') || visualStr.startsWith('data:image')) {
            return `<img src="${visualStr}" class="slot-chore-img" alt="Meal Chore">`;
        }
        return `<span class="slot-chore">${visualStr}</span>`;
    }

    // --- ROUTER ---
    function switchView(view, param = null) {
        currentView = view;
        const content = document.getElementById('app-content');
        content.innerHTML = '';
        
        document.getElementById('nav-kids').className = (view === 'kids' || view === 'kid-dash') ? 'active' : '';
        document.getElementById('nav-meal').className = view === 'mealtime' ? 'active' : '';

        if (view === 'kids') renderKidSelector(content);
        if (view === 'kid-dash') renderKidDashboard(content, param);
        if (view === 'mealtime') renderMealtime(content);
        if (view === 'parent') renderParentDashboard(content);
    }

    // --- 1. KIDS ARCADE ---
    function renderKidSelector(container) {
        const grid = document.createElement('div');
        grid.className = 'kid-grid';
        appData.kids.forEach(kid => {
            const profile = document.createElement('div');
            profile.className = 'kid-profile';
            profile.innerHTML = `
                <div class="kid-circle" style="border-color: ${kid.color}" onclick="switchView('kid-dash', '${kid.id}')">
                    ${kid.icon}
                </div>
                <div class="kid-name" style="color: ${kid.color}">${kid.name}</div>
            `;
            grid.appendChild(profile);
        });
        container.appendChild(grid);
    }

    function renderKidDashboard(container, kidId) {
        const kid = appData.kids.find(k => k.id === kidId);
        
        const kidPending = appData.pending.filter(p => p.kidId === kidId);
        const pendingPoints = kidPending.reduce((sum, p) => sum + p.points, 0);

        const totalStones = 10;
        let earnedStones = Math.floor((kid.points / kid.rewardTarget) * totalStones);
        let pendingStones = Math.floor((pendingPoints / kid.rewardTarget) * totalStones);
        
        if (earnedStones > 10) earnedStones = 10;
        if (earnedStones + pendingStones > 10) pendingStones = 10 - earnedStones;
        
        let stonesHtml = '';
        for(let i=0; i<totalStones; i++) {
            if (i < earnedStones) {
                stonesHtml += `<div class="stone filled" style="background-color: ${kid.color}"></div>`;
            } else if (i < earnedStones + pendingStones) {
                stonesHtml += `<div class="stone pending"></div>`;
            } else {
                stonesHtml += `<div class="stone"></div>`;
            }
        }

        // Setup the Reward Icon
        const isReady = kid.points >= kid.rewardTarget;
        const rewardClass = isReady ? 'path-reward ready-to-claim' : 'path-reward';
        const rewardClick = isReady ? `onclick="claimReward('${kid.id}')"` : '';
        const rewardVisualHtml = getRewardHtml(kid.rewardVisual, 'reward-img-large');

        // Build Header
        const headerDiv = document.createElement('div');
        headerDiv.innerHTML = `
            <div class="kid-header">
                <div class="back-btn" onclick="switchView('kids')">🔙</div>
                <div class="path-container" style="border-color: ${kid.color}">
                    <div class="path-avatar">${kid.icon}</div>
                    <div class="stones-track">${stonesHtml}</div>
                    <div class="${rewardClass}" ${rewardClick}>
                        ${rewardVisualHtml}
                        <div class="path-reward-text">${kid.rewardName}</div>
                        ${isReady ? '<div style="color:#FFD166; font-size:12px; margin-top:5px;">TAP ME!</div>' : ''}
                    </div>
                </div>
            </div>
        `;
        container.appendChild(headerDiv);

        // Filter out completed pending chores
        const availableChores = appData.chores.filter(c => !kidPending.find(p => p.choreName === c.name));
        
        // Split Assigned vs Extra
        const assignedChores = availableChores.filter(c => c.assignees.includes(kid.id));
        const extraChores = availableChores.filter(c => c.isExtra && !c.assignees.includes(kid.id));

        // Render Assigned Grid
        const assignedGrid = document.createElement('div');
        assignedGrid.className = 'chore-grid';
        
        if (assignedChores.length === 0) {
            assignedGrid.innerHTML = `<div class="empty-chores">All your daily chores are done! 🌟</div>`;
        } else {
            assignedChores.forEach(chore => {
                const btn = document.createElement('div');
                btn.className = `chore-btn assigned`;
                btn.innerHTML = `
                    <div class="chore-points">+${chore.points}</div>
                    <div class="chore-emoji">${chore.emoji}</div>
                    <div class="chore-label">${chore.name}</div>
                `;
                btn.onclick = () => completeChore(kid.id, chore);
                assignedGrid.appendChild(btn);
            });
        }
        container.appendChild(assignedGrid);

        // Render Extra Grid (Collapsible)
        if (extraChores.length > 0) {
            const toggleBtn = document.createElement('div');
            toggleBtn.className = 'toggle-extras-btn';
            toggleBtn.innerText = '➕ Show Extra Chores for More Points';
            container.appendChild(toggleBtn);

            const extraGrid = document.createElement('div');
            extraGrid.className = 'chore-grid extra-chores-container';

            extraChores.forEach(chore => {
                const btn = document.createElement('div');
                btn.className = `chore-btn extra`;
                btn.innerHTML = `
                    <div class="chore-points">+${chore.points}</div>
                    <div class="chore-emoji">${chore.emoji}</div>
                    <div class="chore-label">${chore.name}</div>
                `;
                btn.onclick = () => completeChore(kid.id, chore);
                extraGrid.appendChild(btn);
            });
            container.appendChild(extraGrid);

            // Toggle Logic
            toggleBtn.onclick = () => {
                if (extraGrid.style.display === 'none' || extraGrid.style.display === '') {
                    extraGrid.style.display = 'grid';
                    toggleBtn.innerText = '➖ Hide Extra Chores';
                } else {
                    extraGrid.style.display = 'none';
                    toggleBtn.innerText = '➕ Show Extra Chores for More Points';
                }
            };
        }
    }

    function completeChore(kidId, chore) {
        const timeString = new Date().toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
        
        appData.pending.push({
            id: Date.now(), kidId: kidId, choreName: chore.name, points: chore.points, time: timeString
        });
        saveData();

        const celeb = document.getElementById('celebration');
        celeb.style.display = 'flex';
        celeb.innerHTML = `<div style="font-size: 200px;">${chore.emoji}✨</div>`;
        
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            osc.connect(ctx.destination);
            osc.frequency.setValueAtTime(400, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.1);
            osc.start(); osc.stop(ctx.currentTime + 0.15);
        } catch(e) {}

        setTimeout(() => { celeb.style.display = 'none'; switchView('kid-dash', kidId); }, 1500);
    }

    function claimReward(kidId) {
        const kid = appData.kids.find(k => k.id === kidId);
        const celeb = document.getElementById('celebration');
        
        celeb.style.display = 'flex';
        celeb.innerHTML = `
            <div style="font-size: 80px; color: #FFD166; font-weight: bold; text-shadow: 0 5px 15px rgba(0,0,0,0.8); margin-bottom: 20px;">🎉 YOU DID IT! 🎉</div>
            ${getRewardHtml(kid.rewardVisual, 'reward-img-massive')}
            <div style="font-size: 40px; color: #fff; margin-top: 30px; font-weight: bold;">Go tell Mom or Dad!</div>
        `;

        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const playNote = (freq, startTime, duration) => {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.type = 'triangle';
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.1, startTime);
                gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
                osc.start(startTime);
                osc.stop(startTime + duration);
            };
            const now = ctx.currentTime;
            playNote(440, now, 0.2);     
            playNote(554.37, now + 0.2, 0.2); 
            playNote(659.25, now + 0.4, 0.2); 
            playNote(880, now + 0.6, 0.8);    
        } catch(e) {}

        setTimeout(() => { 
            celeb.style.display = 'none'; 
            switchView('kid-dash', kidId);
        }, 4000); 
    }

    // --- 2. MEALTIME SPINNER ---
    function renderMealtime(container) {
        const fullRoster = [...appData.kids, ...appData.extendedRoster];
        let togglesHtml = fullRoster.map(person => {
            const isActive = appData.mealActiveKids.includes(person.id);
            return `
                <div class="toggle-kid ${isActive ? 'active' : ''}" onclick="toggleMealKid('${person.id}')">
                    <div class="toggle-icon">${person.icon}</div>
                    <div class="toggle-name">${person.name}</div>
                </div>`;
        }).join('');

        let slotsHtml = appData.mealChores.map((mc, i) => `
            <div class="meal-slot">
                <div title="${mc.name}" style="display:flex; align-items:center;">
                    ${getMealVisualHtml(mc.emoji)}
                </div>
                <div class="slot-chore-name">${mc.name}</div>
                <span class="slot-assignee" id="slot-${i}">❓</span>
            </div>
        `).join('');

        container.innerHTML = `
            <div class="meal-container">
                <div class="active-toggles">${togglesHtml}</div>
                <button class="spin-btn" onclick="spinMealtime()">🎰 SPIN</button>
                <div class="meal-assignments">${slotsHtml}</div>
            </div>
        `;
    }

    function toggleMealKid(personId) {
        if (appData.mealActiveKids.includes(personId)) {
            appData.mealActiveKids = appData.mealActiveKids.filter(id => id !== personId);
        } else {
            appData.mealActiveKids.push(personId);
        }
        saveData(); renderMealtime(document.getElementById('app-content'));
    }

    function spinMealtime() {
        if (appData.mealActiveKids.length === 0) return;
        const fullRoster = [...appData.kids, ...appData.extendedRoster];
        const activeIcons = appData.mealActiveKids.map(id => fullRoster.find(p => p.id === id).icon);
        const slotsCount = appData.mealChores.length;
        
        let finalAssignments = [];
        let pool = [...activeIcons];
        for(let i=0; i<slotsCount; i++) {
            if(pool.length === 0) pool = [...activeIcons];
            const randomIndex = Math.floor(Math.random() * pool.length);
            finalAssignments.push(pool.splice(randomIndex, 1)[0]);
        }

        let spins = 0;
        const interval = setInterval(() => {
            appData.mealChores.forEach((_, i) => {
                document.getElementById(`slot-${i}`).innerText = activeIcons[Math.floor(Math.random() * activeIcons.length)];
            });
            spins++;
            if (spins > 15) {
                clearInterval(interval);
                appData.mealChores.forEach((_, i) => {
                    document.getElementById(`slot-${i}`).innerText = finalAssignments[i];
                });
            }
        }, 100);
    }

    // --- 3. PARENT DASHBOARD ---
    function promptParent() {
        const pin = prompt("Enter PIN (Hint: 1234):");
        if (pin === "1234") switchView('parent');
    }

    function renderParentDashboard(container) {
        // Pending Queue
        let pendingRows = appData.pending.map(p => {
            const kid = appData.kids.find(k => k.id === p.kidId);
            return `<tr>
                <td>${kid.icon} ${kid.name}</td>
                <td>${p.choreName}</td>
                <td>${p.time}</td>
                <td style="color:#FFD166; font-weight:bold;">+${p.points}</td>
                <td>
                    <button class="action-btn" onclick="approveChore(${p.id})">Approve</button>
                    <button class="action-btn reject-btn" onclick="rejectChore(${p.id})">Reject</button>
                </td>
            </tr>`;
        }).join('');

        // Rewards Table (INLINE EDITABLE)
        let rewardsRows = appData.kids.map(kid => {
            const visualHtml = getRewardHtml(kid.rewardVisual, 'reward-img-small');
            return `
            <tr>
                <td>${kid.icon} <strong>${kid.name}</strong></td>
                <td>
                    <input type="number" class="inline-input inline-pts" value="${kid.points}" 
                           onchange="updateInlineReward('${kid.id}', 'points', this.value)"> pts
                </td>
                <td>
                    <div style="display:flex; align-items:center; gap: 10px; margin-bottom: 5px;">
                        ${visualHtml}
                        <input type="text" class="inline-input" value="${kid.rewardVisual}" 
                               onchange="updateInlineReward('${kid.id}', 'rewardVisual', this.value)" 
                               placeholder="Emoji or Image URL" style="flex-grow: 1;">
                    </div>
                    <div style="display:flex; align-items:center; gap: 5px;">
                        <input type="text" class="inline-input" value="${kid.rewardName}" 
                               onchange="updateInlineReward('${kid.id}', 'rewardName', this.value)" 
                               placeholder="Reward Name" style="width: 130px;">
                        (<input type="number" class="inline-input inline-pts" value="${kid.rewardTarget}" 
                                onchange="updateInlineReward('${kid.id}', 'rewardTarget', this.value)"> pts target)
                    </div>
                </td>
                <td style="text-align: center;">
                    ${kid.points >= kid.rewardTarget 
                        ? `<button class="action-btn" onclick="cashOut('${kid.id}')">Cash Out & Reset</button>` 
                        : `<span style="color:#666;">Needs ${kid.rewardTarget - kid.points} more</span>`}
                </td>
            </tr>`;
        }).join('');

        // Chore Editor Table
        let choreRows = appData.chores.map(c => {
            let assignedStr = c.isExtra ? '<span style="color:#2ECC71">Extra (Anyone)</span>' : c.assignees.map(id => appData.kids.find(k=>k.id===id).name).join(', ');
            if(!c.isExtra && c.assignees.length === 0) assignedStr = '<span style="color:#E74C3C">Unassigned</span>';
            
            return `<tr>
                <td style="font-size: 24px; text-align: center;">${c.emoji}</td>
                <td><strong>${c.name}</strong></td>
                <td style="color:#FFD166;">+${c.points}</td>
                <td>${c.recurrence} days</td>
                <td>${assignedStr}</td>
                <td>
                    <button class="action-btn edit-btn" onclick="editChore(${c.id})">Edit</button>
                    <button class="action-btn delete-btn" onclick="deleteChore(${c.id})">Del</button>
                </td>
            </tr>`;
        }).join('');

        // Mealtime Editor Table
        let mealRows = appData.mealChores.map(mc => `
            <tr>
                <td style="text-align: center;">${getMealVisualHtml(mc.emoji)}</td>
                <td><strong>${mc.name}</strong></td>
                <td>
                    <button class="action-btn edit-btn" onclick="editMealChore(${mc.id})">Edit</button>
                    <button class="action-btn delete-btn" onclick="deleteMealChore(${mc.id})">Del</button>
                </td>
            </tr>
        `).join('');

        container.innerHTML = `
            <div class="kid-header"><div class="back-btn" onclick="switchView('kids')">🔙 Exit Admin</div></div>
            
            <div class="parent-section">
                <h2>1. Pending Approvals</h2>
                ${appData.pending.length === 0 ? '<p style="color:#888">All caught up! No pending chores.</p>' : `
                <div class="table-container">
                    <table>
                        <tr><th>Kid</th><th>Chore</th><th>Submitted At</th><th>Points</th><th>Action</th></tr>
                        ${pendingRows}
                    </table>
                </div>`}
            </div>

            <div class="parent-section">
                <h2>2. Standard Chore Engine</h2>
                <div class="table-container">
                    <table>
                        <tr><th>Icon</th><th>Name</th><th>Value</th><th>Repeat</th><th>Assigned To</th><th>Action</th></tr>
                        ${choreRows}
                    </table>
                </div>
                <div class="add-form">
                    <h3 id="form-title" style="margin-top:0; color:#fff;">Add New Chore</h3>
                    <div class="form-row">
                        <input type="text" id="newEmoji" placeholder="Emoji (e.g. 🐕)" style="width:120px;">
                        <input type="text" id="newName" placeholder="Chore Name">
                        <input type="number" id="newPoints" placeholder="Pts" min="1" value="1" style="width:80px;">
                        <input type="number" id="newRecurrence" placeholder="Days to Repeat" min="1" value="1" style="width:140px;">
                    </div>
                    <span class="hint-text">💡 Emoji Shortcut: Press <b>Win + .</b> (Windows) or <b>Cmd+Ctrl+Space</b> (Mac)</span>
                    <div class="form-row">
                        <label><input type="checkbox" id="chk-jess"> Jesse</label>
                        <label><input type="checkbox" id="chk-magnolia"> Magnolia</label>
                        <label><input type="checkbox" id="chk-dahlia"> Dahlia</label>
                        <label><input type="checkbox" id="chk-duke"> Duke</label>
                        <label style="border-left: 2px solid #555; padding-left: 15px;"><input type="checkbox" id="chk-extra"> Is Extra (Anyone)</label>
                    </div>
                    <button class="action-btn" onclick="saveChore()" id="save-chore-btn">+ Add Chore</button>
                    <button class="action-btn reject-btn" onclick="cancelEdit()" id="cancel-edit-btn" style="display:none;">Cancel</button>
                </div>
            </div>

            <div class="parent-section">
                <h2>3. Mealtime Engine</h2>
                <div class="table-container">
                    <table>
                        <tr><th>Icon</th><th>Mealtime Role</th><th>Action</th></tr>
                        ${mealRows}
                    </table>
                </div>
                <div class="add-form">
                    <h3 id="meal-form-title" style="margin-top:0; color:#fff;">Add Mealtime Role</h3>
                    <div class="form-row">
                        <input type="text" id="newMealEmoji" placeholder="Emoji or Image Path" style="width:200px;">
                        <input type="text" id="newMealName" placeholder="Role Name">
                    </div>
                    <button class="action-btn" onclick="saveMealChore()" id="save-meal-btn">+ Add Role</button>
                    <button class="action-btn reject-btn" onclick="cancelMealEdit()" id="cancel-meal-btn" style="display:none;">Cancel</button>
                </div>
            </div>

            <div class="parent-section">
                <h2>4. Rewards Tracker (Inline Edit)</h2>
                <p style="color: #aaa; font-size: 14px; margin-top: -5px;">Click any box below to type. Changes save automatically when you click away.</p>
                <div class="table-container">
                    <table>
                        <tr><th>Kid</th><th>Current Progress</th><th>Goal Setup</th><th>Status</th></tr>
                        ${rewardsRows}
                    </table>
                </div>
            </div>
        `;
    }

    // --- PARENT LOGIC: CORE ---
    function approveChore(pendingId) {
        const itemIndex = appData.pending.findIndex(p => p.id === pendingId);
        const item = appData.pending[itemIndex];
        const kid = appData.kids.find(k => k.id === item.kidId);
        kid.points += item.points;
        appData.pending.splice(itemIndex, 1);
        saveData(); renderParentDashboard(document.getElementById('app-content'));
    }

    function rejectChore(pendingId) {
        appData.pending = appData.pending.filter(p => p.id !== pendingId);
        saveData(); renderParentDashboard(document.getElementById('app-content'));
    }

    function cashOut(kidId) {
        const kid = appData.kids.find(k => k.id === kidId);
        if(confirm(`Reset points for ${kid.name}?`)) {
            kid.points = 0; saveData(); renderParentDashboard(document.getElementById('app-content'));
        }
    }

    // INLINE EDITING LOGIC
    function updateInlineReward(kidId, field, value) {
        const kid = appData.kids.find(k => k.id === kidId);
        if (field === 'points' || field === 'rewardTarget') {
            kid[field] = parseInt(value) || 0;
        } else {
            kid[field] = value;
        }
        saveData(); 
        renderParentDashboard(document.getElementById('app-content'));
    }

    // --- PARENT LOGIC: STANDARD CHORES ---
    function deleteChore(choreId) {
        if(confirm("Remove this chore from the boards?")) {
            appData.chores = appData.chores.filter(c => c.id !== choreId);
            saveData(); renderParentDashboard(document.getElementById('app-content'));
        }
    }

    function editChore(id) {
        editingChoreId = id;
        const c = appData.chores.find(ch => ch.id === id);
        document.getElementById('newEmoji').value = c.emoji;
        document.getElementById('newName').value = c.name;
        document.getElementById('newPoints').value = c.points;
        document.getElementById('newRecurrence').value = c.recurrence || 1;
        document.getElementById('chk-jess').checked = c.assignees.includes('jess');
        document.getElementById('chk-magnolia').checked = c.assignees.includes('magnolia');
        document.getElementById('chk-dahlia').checked = c.assignees.includes('dahlia');
        document.getElementById('chk-duke').checked = c.assignees.includes('duke');
        document.getElementById('chk-extra').checked = c.isExtra;

        document.getElementById('form-title').innerText = "Edit Chore: " + c.name;
        document.getElementById('save-chore-btn').innerText = "Save Changes";
        document.getElementById('cancel-edit-btn').style.display = "inline-block";
        window.scrollTo({ top: document.querySelector('.add-form').offsetTop, behavior: 'smooth' });
    }

    function cancelEdit() {
        editingChoreId = null;
        document.getElementById('newEmoji').value = '';
        document.getElementById('newName').value = '';
        document.getElementById('newPoints').value = '1';
        document.getElementById('newRecurrence').value = '1';
        ['jess', 'magnolia', 'dahlia', 'duke', 'extra'].forEach(id => document.getElementById('chk-'+id).checked = false);
        
        document.getElementById('form-title').innerText = "Add New Chore";
        document.getElementById('save-chore-btn').innerText = "+ Add Chore";
        document.getElementById('cancel-edit-btn').style.display = "none";
    }

    function saveChore() {
        const emoji = document.getElementById('newEmoji').value || '✨';
        const name = document.getElementById('newName').value || 'New Chore';
        const points = parseInt(document.getElementById('newPoints').value) || 1;
        const recurrence = parseInt(document.getElementById('newRecurrence').value) || 1;
        const isExtra = document.getElementById('chk-extra').checked;
        
        let assignees = [];
        if(document.getElementById('chk-jess').checked) assignees.push('jess');
        if(document.getElementById('chk-magnolia').checked) assignees.push('magnolia');
        if(document.getElementById('chk-dahlia').checked) assignees.push('dahlia');
        if(document.getElementById('chk-duke').checked) assignees.push('duke');

        if(editingChoreId) {
            const index = appData.chores.findIndex(c => c.id === editingChoreId);
            appData.chores[index] = { ...appData.chores[index], emoji, name, points, recurrence, assignees, isExtra };
        } else {
            appData.chores.push({ id: Date.now(), emoji, name, points, recurrence, assignees, isExtra });
        }
        saveData(); renderParentDashboard(document.getElementById('app-content')); cancelEdit();
    }

    // --- PARENT LOGIC: MEALTIME CHORES ---
    function deleteMealChore(id) {
        if(confirm("Remove this role from Mealtime?")) {
            appData.mealChores = appData.mealChores.filter(mc => mc.id !== id);
            saveData(); renderParentDashboard(document.getElementById('app-content'));
        }
    }

    function editMealChore(id) {
        editingMealChoreId = id;
        const mc = appData.mealChores.find(m => m.id === id);
        document.getElementById('newMealEmoji').value = mc.emoji;
        document.getElementById('newMealName').value = mc.name;

        document.getElementById('meal-form-title').innerText = "Edit Role: " + mc.name;
        document.getElementById('save-meal-btn').innerText = "Save Changes";
        document.getElementById('cancel-meal-btn').style.display = "inline-block";
    }

    function cancelMealEdit() {
        editingMealChoreId = null;
        document.getElementById('newMealEmoji').value = '';
        document.getElementById('newMealName').value = '';
        document.getElementById('meal-form-title').innerText = "Add Mealtime Role";
        document.getElementById('save-meal-btn').innerText = "+ Add Role";
        document.getElementById('cancel-meal-btn').style.display = "none";
    }

    function saveMealChore() {
        const emoji = document.getElementById('newMealEmoji').value || '🍽️';
        const name = document.getElementById('newMealName').value || 'New Role';

        if(editingMealChoreId) {
            const index = appData.mealChores.findIndex(mc => mc.id === editingMealChoreId);
            appData.mealChores[index] = { ...appData.mealChores[index], emoji, name };
        } else {
            appData.mealChores.push({ id: Date.now(), emoji, name });
        }
        saveData(); renderParentDashboard(document.getElementById('app-content')); cancelMealEdit();
    }

    // Boot up
    switchView('kids');

</script>
</body>
</html>
